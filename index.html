<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wander AI Studio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="tag">Educational AI Command Center</p>
      <h1>Wander AI Studio</h1>
      <p>Plan lessons, organize AI tools, create materials, and manage teaching projects in one place.</p>
    </header>

    <section class="actions">
      <button onclick="openPrompt('lesson')">Plan a Lesson</button>
      <button onclick="openPrompt('assessment')">Create Assessment</button>
      <button onclick="openPrompt('slides')">Prepare Slides</button>
      <button onclick="openPrompt('game')">Build a Game</button>
    </section>

    <section class="grid">
      <article class="card">
        <h2>Teaching</h2>
        <a href="#">IPC Studio</a>
        <a href="#">Language Arts</a>
        <a href="#">Parent Messages</a>
      </article>

      <article class="card">
        <h2>AI Platforms</h2>
        <a href="https://chatgpt.com" target="_blank">ChatGPT</a>
        <a href="https://claude.ai" target="_blank">Claude</a>
        <a href="https://gemini.google.com" target="_blank">Gemini</a>
        <a href="https://notebooklm.google.com" target="_blank">NotebookLM</a>
      </article>

      <article class="card">
        <h2>Creation</h2>
        <a href="https://www.canva.com" target="_blank">Canva</a>
        <a href="https://kahoot.com" target="_blank">Kahoot</a>
        <a href="https://github.com/wandermartins-prog" target="_blank">GitHub</a>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
